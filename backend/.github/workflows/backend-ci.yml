name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: ./backend

jobs:
  # ============================================================
  # Quality Gates: install, lint, typecheck, test
  # ============================================================
  quality:
    name: Lint · Typecheck · Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_password
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nexus:nexus_password@localhost:5432/nexus_test?schema=public
      DIRECT_URL: postgresql://nexus:nexus_password@localhost:5432/nexus_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci_jwt_access_secret_at_least_32_characters_long
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_at_least_32_characters_long
      BETTER_AUTH_SECRET: ci_better_auth_secret_32_chars_min
      COOKIE_SECRET: ci_cookie_secret_32_chars_minimum
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Validate Prisma schema
        run: bunx prisma validate

      - name: Run migrations
        run: bunx prisma migrate deploy || bunx prisma db push --accept-data-loss

      - name: Lint
        run: bun run lint:check

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ============================================================
  # Build: produce production artifact
  # ============================================================
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Build
        run: bun run build

      - name: Verify build output
        run: test -f dist/main.js && echo "Build verified"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7

  # ============================================================
  # Docker Build (optional, only on main/develop)
  # ============================================================
  docker:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: nexus-ai-gateway-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
