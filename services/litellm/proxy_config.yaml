# ============================================================
# Nexus AI Gateway — LiteLLM Proxy Configuration
# ============================================================
# Official LiteLLM proxy_config.yaml format.
# Reference: https://docs.litellm.ai/docs/proxy/configs
#
# LiteLLM is deployed as an INDEPENDENT service.
# NestJS communicates ONLY with this proxy.
# NestJS NEVER talks to AI providers directly.
# ============================================================

model_list:
  # ---------- OpenAI (via LiteLLM) ----------
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-4-turbo
    litellm_params:
      model: openai/gpt-4-turbo
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: os.environ/OPENAI_API_KEY

  # ---------- Anthropic (via LiteLLM) ----------
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20240620
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-3-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

  # ---------- Google AI (via LiteLLM) ----------
  - model_name: gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY
  - model_name: gemini-1.5-flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # ---------- Mistral (via LiteLLM) ----------
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY
  - model_name: mistral-8x7b
    litellm_params:
      model: mistral/mistral-8x7b-instruct
      api_key: os.environ/MISTRAL_API_KEY

# ============================================================
# Router settings — fallbacks, retries, load balancing
# ============================================================
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 30
  fallbacks:
    - gpt-4o: [claude-3-5-sonnet, gemini-1.5-pro]
    - claude-3-5-sonnet: [gpt-4o, gemini-1.5-pro]
  allowed_fails: 3
  cooldown_time: 60

# ============================================================
# LiteLLM Proxy general settings
# ============================================================
litellm_settings:
  drop_params: true
  request_timeout: 30
  stream_timeout: 60
  telemetry: false
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    namespace: litellm_cache

# ============================================================
# General proxy settings
# ============================================================
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  disable_spend_logs: false
  disable_reset_budget: false

# ============================================================
# Optional callback for sending metrics to NestJS
# ============================================================
callback_settings:
  success_callback: ["generic_api"]
  failure_callback: ["generic_api"]
  generic_api_callback_url: http://backend:3001/litellm/internal/callback

# ============================================================
# Logging
# ============================================================
litellm_proxies:
  - logging: true
