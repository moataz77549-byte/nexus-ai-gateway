# ============================================================
# Nexus AI Gateway — Full Platform Docker Compose
# ============================================================
# Orchestrates:
#   - PostgreSQL (database)
#   - Redis (cache + queue)
#   - LiteLLM Proxy (AI gateway — independent service)
#   - NestJS Backend (auth, RBAC, LiteLLM management)
#
# Usage:
#   docker compose up -d
#   docker compose up -d --build   (rebuild after code changes)
#   docker compose down -v         (tear down + wipe data)
# ============================================================

version: "3.9"

services:
  # -------------------- PostgreSQL --------------------
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexus
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nexus-network

  # -------------------- Redis --------------------
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - nexus-network

  # -------------------- LiteLLM Proxy (AI Gateway) --------------------
  # INDEPENDENT SERVICE — uses official LiteLLM image, no source modifications.
  # NestJS backend talks ONLY to this service, never to AI providers directly.
  litellm:
    build:
      context: ./services/litellm
      dockerfile: Dockerfile
    container_name: nexus-litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # LiteLLM proxy
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-change-me-to-a-secure-random-string}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-change-me-to-a-secure-salt}
      LITELLM_LOG: INFO
      # Database (shared with backend — LiteLLM uses for spend logs / virtual keys)
      DATABASE_URL: postgresql://nexus:nexus_password@postgres:5432/nexus?schema=litellm
      # Redis (shared with backend — LiteLLM uses for caching)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # AI Provider API Keys (passed through to LiteLLM)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - nexus-network

  # -------------------- NestJS Backend --------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_URL: http://localhost:3001
      # Database
      DATABASE_URL: postgresql://nexus:nexus_password@postgres:5432/nexus?schema=public
      DIRECT_URL: postgresql://nexus:nexus_password@postgres:5432/nexus?schema=public
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_KEY_PREFIX: "nexus:"
      # JWT secrets
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-please_change_me_to_a_64_char_random_hex_string}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-please_change_me_to_another_64_char_hex_string}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      JWT_ISSUER: nexus-ai-gateway
      JWT_AUDIENCE: nexus-ai-gateway-users
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-please_change_me_to_32_char_secret}
      BCRYPT_ROUNDS: 12
      COOKIE_SECRET: ${COOKIE_SECRET:-please_change_me_to_32_char_secret}
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      # Rate limiting
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_LIMIT: 100
      API_KEY_PREFIX: nx
      # Queue
      QUEUE_PREFIX: nexus
      QUEUE_CONCURRENCY: 5
      # Swagger
      SWAGGER_PATH: api/docs
      SWAGGER_ENABLED: "true"
      LOG_LEVEL: info
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # ===== LiteLLM Integration =====
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-change-me-to-a-secure-random-string}
      LITELLM_PROXY_TIMEOUT_MS: 30000
      LITELLM_SYNC_INTERVAL_MINUTES: 5
      LITELLM_HEALTH_CHECK_INTERVAL_MS: 30000
      LITELLM_CACHE_TTL_SECONDS: 300
      LITELLM_CIRCUIT_BREAKER_FAILURE_THRESHOLD: 5
      LITELLM_CIRCUIT_BREAKER_RESET_TIMEOUT_MS: 60000
      LITELLM_RETRY_ATTEMPTS: 3
      LITELLM_RETRY_BASE_DELAY_MS: 500
      LITELLM_POOL_MAX_CONNECTIONS: 50
      LITELLM_REQUEST_TIMEOUT_MS: 30000
      LITELLM_STREAM_TIMEOUT_MS: 60000
    ports:
      - "3001:3001"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - nexus-network
    command: sh -c "bunx prisma migrate deploy && node dist/main.js"

# -------------------- Next.js Frontend --------------------
frontend:
  build:
    context: .
    dockerfile: Dockerfile
  container_name: nexus-frontend
  restart: unless-stopped
  depends_on:
    backend:
      condition: service_healthy
  environment:
    NODE_ENV: production
    PORT: 3000
    NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
  ports:
    - "3000:3000"
  networks:
    - nexus-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  nexus-network:
    driver: bridge
